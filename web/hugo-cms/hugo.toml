baseURL = "https://example.github.io/my-wiki/"
title = "My Wiki"
languageCode = "en"

# Point at the generated Hugo content mirror created by `llm-wiki web install`.
# The mirror preserves wiki Markdown while converting section `index.md` files
# to Hugo `_index.md` files so folders remain browseable sections.

# Frontmatter field mapping
[frontmatter]
  lastmod = ["last_updated", ":git"]
  date    = ["last_updated", ":git"]

# Taxonomies from wiki frontmatter
[taxonomies]
  tag    = "tags"
  author = "owner"
  type   = "type"

# Mount the generated content mirror, excluding non-content folders
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
    excludeFiles = [
      "inbox/**",
      "raw/**",
      "schemas/**",
      "**/*.json",
      "**/*.txt",
      "**/LINT.md",
    ]

# Markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true        # required for mermaid fenced blocks and raw HTML
  [markup.highlight]
    style = "monokai"

# Output formats
[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[params]
  description = "A wiki powered by llm-wiki and Hugo"
  mermaid     = true
  showMetadata   = true
  showBacklinks  = true
  showSuperseded = true
