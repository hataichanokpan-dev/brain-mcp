<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main class="main">
    <div class="app-shell">
      <aside class="side-rail" aria-label="Sections">
        <nav>
          <a href="{{ "/" | relURL }}">All Pages</a>
          {{ range .Site.Sections }}
          <a href="{{ .RelPermalink }}">{{ partial "page-title.html" . }} <span>{{ len .Pages }}</span></a>
          {{ end }}
        </nav>
      </aside>
      <div class="container">
      {{ block "main" . }}{{ end }}
      </div>
    </div>
  </main>
  {{ partial "footer.html" . }}
  {{ if .Site.Params.mermaid }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
  </script>
  {{ end }}
</body>
</html>
