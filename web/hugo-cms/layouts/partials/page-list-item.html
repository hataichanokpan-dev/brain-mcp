<li class="page-item {{ if eq .Params.status "archived" }}archived{{ end }}">
  <a href="{{ .RelPermalink }}" class="page-link">{{ .Title }}</a>
  {{ with .Params.summary }}<span class="page-summary">— {{ . }}</span>{{ end }}
  <span class="page-meta">
    {{ with .Params.type }}<span class="type-badge type-{{ . | urlize }}">{{ . }}</span>{{ end }}
    {{ with .Params.status }}{{ if ne . "active" }}<span class="status-badge status-{{ . }}">{{ . }}</span>{{ end }}{{ end }}
    {{ with .Params.confidence }}<span class="confidence">{{ printf "%.0f%%" (mul . 100) }}</span>{{ end }}
  </span>
</li>
